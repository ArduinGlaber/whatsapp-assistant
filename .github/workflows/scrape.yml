name: Scrape Facebook Marketplace

on:
  schedule:
    - cron: '0 13,21 * * *'  # 8 AM and 8 PM Cuba time (UTC-5)
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.11'
  DB_PATH: 'scraper/data/listings.db'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python -m scraper.main --db-path ${{ env.DB_PATH }}
        env:
          FACEBOOK_EMAIL: ${{ secrets.FACEBOOK_EMAIL }}
          FACEBOOK_PASSWORD: ${{ secrets.FACEBOOK_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Check if database exists
        id: check_db
        run: |
          if [ -f "${{ env.DB_PATH }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "size=$(wc -c < ${{ env.DB_PATH }})" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "size=0" >> $GITHUB_OUTPUT
          fi

      - name: Create or update release
        if: steps.check_db.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          release_name: 'Latest Listings Database'
          body: |
            Automated release with scraped Facebook Marketplace listings.
            
            **Database size:** ${{ steps.check_db.outputs.size }} bytes
            
            _Generated by GitHub Actions workflow_
          files: ${{ env.DB_PATH }}
          if_no_assets_found: 'ignore'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log when no database created
        if: steps.check_db.outputs.exists == 'false'
        run: |
          echo "No database was created. Facebook login may have failed or no posts were scraped."
          echo "Check the workflow logs for details."
